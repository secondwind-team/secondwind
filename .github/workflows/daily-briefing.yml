# 매일 아침 경제 시황을 FINZ 구독 방에 보내는 스케줄 트리거.
#
# 무엇을 하나: 매일 09:00 KST(=00:00 UTC)에 prod 의 보안 엔드포인트
#   GET /api/finz/cron/briefing 을 Bearer 토큰으로 호출한다. 실제 시황 생성·전송은 그 서버 라우트가 한다.
#   (이 워크플로는 "알람 시계"일 뿐, 코드/데이터를 직접 만지지 않는다.)
#
# 위험 설명(비개발자용): 외부 호출 1건만 보냄. 실패해도 앱·배포에 영향 없음(그날 시황만 안 옴).
#   토큰이 틀리면 서버가 401 로 거절 → 아무 일도 안 일어남.
#
# ⚠️ 동작하려면 GitHub 레포 Secret 에 CRON_SECRET 을 넣어야 한다(Settings → Secrets and variables
#   → Actions). 같은 값을 Vercel 환경변수 CRON_SECRET 에도 넣어야 서버가 검증한다(양쪽 동일 값).
#
# 참고: GitHub 스케줄은 best-effort 라 몇 분 늦을 수 있고, 레포가 60일간 활동 없으면 자동 비활성된다.
#   즉시 테스트하려면 Actions 탭에서 "Run workflow"(workflow_dispatch)로 수동 실행.

name: daily-briefing

on:
  schedule:
    - cron: "0 0 * * *" # 00:00 UTC = 09:00 KST 매일
  workflow_dispatch: {} # 수동 실행(테스트용)

jobs:
  trigger:
    name: trigger morning briefing
    runs-on: ubuntu-latest
    steps:
      - name: call briefing endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET 미설정 — 레포 Settings → Secrets → Actions 에 추가해야 시황이 동작합니다."
            exit 1
          fi
          # transient 네트워크/5xx 는 2회 재시도. 인증오류(401)·미설정(503)은 빨강(actionable),
          # LLM 일시 실패는 엔드포인트가 200 으로 처리해 워크플로는 정상 유지.
          curl -fsS --retry 2 --retry-delay 30 -X GET \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://secondwind-mu.vercel.app/api/finz/cron/briefing"
