name: guard

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  author-email-check:
    name: 커밋 author 검증
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 회사 도메인이 commit author 에 섞였는지 확인
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            RANGE="$BASE..$HEAD"
          else
            # push 이벤트: 최근 20개 커밋까지만 확인
            RANGE="HEAD~20..HEAD"
          fi

          # 검사 대상 패턴 (이메일 전체 또는 일부에 포함되면 차단)
          BAD=$(git log --format='%H %ae' "$RANGE" 2>/dev/null | \
                grep -Ei 'woowahan|@corp\.|internal|@.*\.work$' || true)

          if [ -n "$BAD" ]; then
            echo "::error::회사/조직 계정 이메일이 감지되었습니다:"
            echo "$BAD"
            echo ""
            echo "secondwind 은 개인 GitHub 계정만 허용합니다."
            echo "과거 커밋이라면 rebase 로 author 를 재작성하세요."
            exit 1
          fi

          echo "✅ 커밋 author 전부 개인 계정 도메인입니다."
