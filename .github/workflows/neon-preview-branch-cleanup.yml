# PR 이 닫히거나(머지 포함) 끝나면, 그 PR 브랜치에서 만들어진 Neon "프리뷰 DB 브랜치"를 지운다.
#
# 왜: Vercel↔Neon 통합이 프리뷰 배포마다 Neon 브랜치를 1개씩 만든다. PR 이 끝나도 그 브랜치가 안 지워지면
#     Neon 무료 플랜의 브랜치 한도(~10)가 차고, 그 순간부터 새 배포가 "Resource provisioning failed" 로 막힌다
#     (preview·production 모두). 이 워크플로가 PR 종료 시 해당 브랜치를 정리해 그 재발을 막는다.
#
# 무엇을 하나: PR 종료 시 Neon API 로 ① 브랜치 목록을 받아 ② default(운영) 브랜치를 제외하고
#     ③ 이름에 그 PR 의 git 브랜치명이 들어간 프리뷰 브랜치만 삭제한다. 코드/배포는 건드리지 않는다.
#
# 위험 설명(비개발자용): Neon 의 "프리뷰용 임시 DB 복사본"만 지운다. 운영 DB(default 브랜치)는 절대 안 건드린다
#     (목록에서 default 를 명시적으로 제외). 시크릿이 없으면 조용히 아무 것도 안 한다(앱·CI 영향 0).
#
# ⚠️ 동작하려면 GitHub 레포 Secret 에 두 값이 필요(둘 다 없으면 skip):
#     - NEON_API_KEY     : Neon 콘솔 → Account settings → API keys 에서 발급
#     - NEON_PROJECT_ID  : Neon 콘솔의 프로젝트 ID (Vercel 환경변수 NEON_PROJECT_ID 와 동일 값)
#     (키는 채팅/코드에 절대 붙이지 말고 GitHub Settings → Secrets and variables → Actions 에 넣을 것.)
#
# 참고: 통합이 만드는 브랜치 이름 규칙이 'preview/<git브랜치>' 가 아니면, 아래 contains 매칭이 안 잡혀 no-op 이
#     된다(안전하게 아무 것도 안 지움). 그럴 땐 Neon 콘솔 Branches 에서 실제 이름을 보고 jq 필터만 조정하면 된다.

name: neon-preview-branch-cleanup

on:
  pull_request:
    types: [closed] # 머지 + 그냥 닫힘 모두

# 같은 PR 에 대해 동시 실행 방지.
concurrency:
  group: neon-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  delete-preview-branch:
    name: delete Neon preview branch for closed PR
    runs-on: ubuntu-latest
    steps:
      - name: Delete matching Neon preview branch(es)
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$NEON_API_KEY" ] || [ -z "$NEON_PROJECT_ID" ]; then
            echo "::notice::NEON_API_KEY/NEON_PROJECT_ID 미설정 — 프리뷰 브랜치 정리를 건너뜁니다(설정하면 자동 동작)."
            exit 0
          fi

          API="https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches"

          # 비-default(운영 아님) + 이름에 이 PR git 브랜치명이 포함된 프리뷰 브랜치 id 만 추출.
          # default/primary 브랜치(=운영 DB)는 명시적으로 제외 → 운영 데이터는 절대 안 지운다.
          ids=$(curl -fsS -H "Authorization: Bearer ${NEON_API_KEY}" -H "Accept: application/json" "$API" \
            | jq -r --arg ref "$HEAD_REF" '
                .branches[]
                | select((.default // false) == false)
                | select((.primary // false) == false)
                | select((.name // "") | contains($ref))
                | .id
              ') || { echo "::warning::Neon 브랜치 목록 조회 실패 — 이번 정리 건너뜀."; exit 0; }

          if [ -z "$ids" ]; then
            echo "::notice::'${HEAD_REF}' 와 매칭되는 프리뷰 브랜치 없음(이미 정리됐거나 이름 규칙이 다름)."
            exit 0
          fi

          for id in $ids; do
            echo "deleting Neon preview branch id=${id}"
            if curl -fsS -X DELETE -H "Authorization: Bearer ${NEON_API_KEY}" "${API}/${id}" >/dev/null; then
              echo "  deleted ${id}"
            else
              echo "::warning::브랜치 ${id} 삭제 실패(무시 — 다음 PR 종료 때 재시도)."
            fi
          done
